<div id="modal-modelos" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
    <div class="bg-slate-900 border border-slate-800 w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center">
            <h3 class="text-xl font-bold">Gestor de Modelos</h3>
            <button onclick="document.getElementById('modal-modelos').classList.add('hidden')" class="text-slate-400 hover:text-white">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div class="p-6 overflow-y-auto flex-1 space-y-6 custom-scrollbar">
            <div class="bg-slate-800/50 p-4 rounded-xl border border-dashed border-slate-700">
                <h4 class="text-sm font-semibold mb-3 text-blue-400">Registar Novo Modelo</h4>
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="add-model-id" placeholder="ID (ex: gemma)" class="bg-slate-900 border-slate-700 rounded-lg p-2 text-sm">
                    <select id="add-model-tipo" class="bg-slate-900 border-slate-700 rounded-lg p-2 text-sm">
                        <option value="texto">Texto (Ollama)</option>
                        <option value="imagem">Imagem (SD)</option>
                    </select>
                    <input type="text" id="add-model-desc" placeholder="Descrição curta" class="col-span-2 bg-slate-900 border-slate-700 rounded-lg p-2 text-sm">
                    <button id="btn-adicionar-modelo" class="col-span-2 bg-blue-600 hover:bg-blue-500 py-2 rounded-lg text-sm font-bold transition-colors">
                        Registar no Banco de Dados
                    </button>
                </div>
            </div>

            <div id="lista-gerenciador-modelos" class="space-y-3"></div>
        </div>

        <div class="p-6 border-t border-slate-800 flex justify-between items-center bg-slate-950/50">
            <button id="btn-sincronizar-modelos" class="text-sm text-blue-400 hover:underline">Sincronizar com Ollama</button>
            <div id="controles-download" class="hidden">
                <button id="btn-instalar-modelos" class="bg-green-600 hover:bg-green-500 px-6 py-2 rounded-lg font-bold text-sm flex items-center gap-2 transition-all">
                    <i class="fa-solid fa-download"></i> Instalar Selecionados
                </button>
            </div>
        </div>
    </div>
</div>

<div id="modal-global" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
    <div class="bg-slate-900 border border-slate-800 w-full max-w-md rounded-2xl shadow-2xl">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center">
            <h3 class="text-xl font-bold">Configurações Gerais</h3>
            <button onclick="document.getElementById('modal-global').classList.add('hidden')" class="text-slate-400 hover:text-white">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-2">Contexto Global (System Prompt)</label>
                <textarea id="input-contexto-global" rows="4" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white"></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-2">Modelo Padrão</label>
                <select id="input-modelo-padrao" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white"></select>
            </div>
            <button id="btn-salvar-global" class="w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-500 transition-colors text-white">Salvar Alterações</button>
        </div>
    </div>
</div>

<div id="modal-lightbox" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/95 transition-all p-4" onclick="document.getElementById('modal-lightbox').classList.add('hidden')">
    <img id="img-lightbox" class="max-w-full max-h-full rounded-lg shadow-2xl transition-transform duration-300 scale-95 opacity-0">
</div>

<div id="modal-config-chat" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
    <div class="bg-slate-900 border border-slate-800 w-full max-w-lg rounded-2xl shadow-2xl">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center">
            <h3 class="text-xl font-bold text-white">Configurações do Chat</h3>
            <button onclick="document.getElementById('modal-config-chat').classList.add('hidden')" class="text-slate-400 hover:text-white">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-2">Título da Conversa</label>
                <input type="text" id="input-chat-titulo" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-2">Instrução Específica (Contexto)</label>
                <textarea id="input-chat-contexto" rows="3" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white" placeholder="Ex: Aja como um programador sênior..."></textarea>
            </div>
            
            <div class="grid grid-cols-2 gap-4 border-t border-slate-800 pt-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Ícone do Chat</label>
                    <input type="file" id="input-chat-icone" accept="image/*" class="w-full text-sm text-slate-400 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-slate-700 file:text-white hover:file:bg-slate-600">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Imagem de Fundo</label>
                    <input type="file" id="input-chat-bg" accept="image/*" class="w-full text-sm text-slate-400 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-slate-700 file:text-white hover:file:bg-slate-600">
                </div>
            </div>

            <div class="flex items-center justify-between border-t border-slate-800 pt-4">
                <div>
                    <p class="text-sm font-medium text-white">Streaming de Texto</p>
                    <p class="text-xs text-slate-400">Efeito máquina de escrever ao receber respostas.</p>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="switch-stream-chat" class="sr-only peer" checked>
                    <div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                </label>
            </div>

            <button id="btn-salvar-chat" class="w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-500 transition-colors text-white mt-2">
                Guardar Alterações
            </button>

            <hr class="border-slate-800 my-4">
            <button id="btn-apagar-chat" class="w-full bg-red-600 py-3 rounded-lg font-bold hover:bg-red-500 transition-colors text-white mt-2 flex justify-center items-center gap-2">
                <i class="fa-solid fa-trash"></i> Excluir Chat Permanentemente
            </button>

        </div>
    </div>
</div>
