<div id="tela-inicial" class="flex-1 flex flex-col items-center justify-center p-10 text-center">
    <div class="w-24 h-24 bg-blue-600 rounded-3xl flex items-center justify-center text-4xl mb-6 shadow-lg shadow-blue-900/20">
        <i class="fa-solid fa-robot"></i>
    </div>
    <h1 class="text-4xl font-bold mb-4">Bem-vindo ao AI Chat Studio</h1>
    <p class="text-slate-400 max-w-md">Selecione um chat ao lado ou crie uma nova conversa para começar a explorar os modelos locais.</p>
</div>

<div id="tela-chat" class="hidden flex-1 flex flex-col h-full bg-slate-900 relative">
    <header class="h-16 border-b border-slate-800 flex items-center justify-between px-6 bg-slate-900/50 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <div id="chat-icon-header" class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-sm"></div>
            <h2 id="chat-titulo-header" class="font-semibold text-lg text-white">Chat</h2>
        </div>
        <div class="flex items-center gap-4">
            <select id="seletor-modelo" class="bg-slate-800 border-none rounded-md px-3 py-1 text-sm focus:ring-2 focus:ring-blue-500 text-white"></select>
            <button id="btn-config-chat" class="text-slate-400 hover:text-white transition-colors p-2" title="Configurações da Conversa">
                <i class="fa-solid fa-gear"></i>
            </button>
        </div>
    </header>

    <div id="area-mensagens" class="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar"></div>

    <button id="btn-scroll-bottom" class="hidden absolute bottom-28 right-8 bg-slate-700/90 hover:bg-blue-600 text-white w-10 h-10 rounded-full shadow-lg backdrop-blur-sm transition-all duration-300 z-10 border border-slate-600 flex items-center justify-center">
        <i class="fa-solid fa-chevron-down"></i>
    </button>

    <div class="p-4 bg-slate-900">
        <div class="max-w-4xl mx-auto relative">
            <div id="container-previa-imagem" class="hidden absolute bottom-full mb-4 left-0 p-2 bg-slate-800 rounded-lg border border-slate-700 shadow-xl">
                <img id="img-previa" class="h-32 rounded-md object-contain">
                <button id="btn-remover-anexo" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs hover:bg-red-600">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="flex items-end gap-2 bg-slate-800 rounded-2xl p-2 shadow-inner border border-slate-700 focus-within:border-blue-500 transition-all">
                <button id="btn-anexar" class="p-3 text-slate-400 hover:text-white transition-colors">
                    <i class="fa-solid fa-paperclip text-xl"></i>
                </button>
                <input type="file" id="input-anexo" class="hidden" accept="image/*">
                
                <textarea id="input-mensagem" rows="1" placeholder="Escreva aqui sua mensagem..." 
                          class="flex-1 bg-transparent border-none focus:ring-0 py-3 resize-none max-h-64 custom-scrollbar text-white"></textarea>
                
                <button id="btn-enviar" class="p-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl transition-all shadow-lg">
                    <i class="fa-solid fa-paper-plane text-xl"></i>
                </button>
            </div>
        </div>
    </div>
</div>
